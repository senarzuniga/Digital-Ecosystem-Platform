version: "3.9"

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dep_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-dep}:${POSTGRES_PASSWORD:-dep_secret}@postgres:5432/${POSTGRES_DB:-dep_platform}
      - SECRET_KEY=${SECRET_KEY:-CHANGE-ME-IN-PRODUCTION}
      - CORS_ORIGINS=http://localhost:8501,http://frontend:8501
      - EVENT_BUS_BACKEND=${EVENT_BUS_BACKEND:-memory}
      - REDIS_URL=redis://redis:6379
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST:-mqtt}
      - MQTT_ENABLED=${MQTT_ENABLED:-false}
      - DEBUG=${DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dep_postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-dep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dep_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-dep_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dep}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (optional event bus + caching) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dep_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ── MQTT Broker (optional IIoT) ───────────────────────────────────────────────
  mqtt:
    image: eclipse-mosquitto:2
    container_name: dep_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped
    profiles:
      - iot   # only starts when --profile iot is passed

  # ── Streamlit Frontend ────────────────────────────────────────────────────────
  frontend:
    image: python:3.12-slim
    container_name: dep_frontend
    working_dir: /app
    command: >
      bash -c "pip install -r requirements.txt -q &&
               streamlit run app.py --server.port 8501 --server.address 0.0.0.0"
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    environment:
      - DEP_BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
